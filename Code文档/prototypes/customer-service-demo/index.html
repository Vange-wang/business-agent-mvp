<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智能客服业务智能体商业演示</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        background: #f5f7fb;
        color: #182033;
        overflow-x: hidden;
      }
      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 420px) minmax(320px, 1fr);
        gap: 24px;
        padding: 32px;
      }
      .panel {
        background: #fff;
        border: 1px solid #dce3ef;
        border-radius: 8px;
        box-shadow: 0 12px 32px rgba(24, 32, 51, 0.08);
        min-width: 0;
      }
      .intro { padding: 28px; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      h2 { margin: 24px 0 10px; font-size: 16px; }
      p, li { line-height: 1.7; overflow-wrap: anywhere; }
      .intro,
      .meta div,
      .chat-header span,
      .msg {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      ul { padding-left: 20px; }
      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: calc(100vh - 64px);
      }
      .chat-header {
        padding: 18px 20px;
        border-bottom: 1px solid #dce3ef;
      }
      .chat-header strong { display: block; font-size: 18px; }
      .chat-header span { color: #62708a; font-size: 13px; }
      .meta {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }
      .meta div {
        padding: 12px;
        border: 1px solid #dce3ef;
        border-radius: 6px;
        background: #fafcff;
      }
      .meta strong {
        display: block;
        margin-bottom: 4px;
      }
      .messages {
        padding: 20px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 78%;
        padding: 12px 14px;
        border-radius: 8px;
        line-height: 1.6;
        white-space: pre-line;
      }
      .bot { background: #eef4ff; align-self: flex-start; border: 1px solid #d5e4ff; }
      .user { background: #143a5a; color: white; align-self: flex-end; }
      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        padding: 16px;
        border-top: 1px solid #dce3ef;
      }
      input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #b8c3d6;
        border-radius: 6px;
        font-size: 15px;
      }
      button {
        padding: 0 18px;
        border: 0;
        border-radius: 6px;
        background: #0f7b6c;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      .chip {
        padding: 8px 10px;
        background: #eef4ff;
        border: 1px solid #d5e4ff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        color: #182033;
        font-weight: 600;
      }
      @media (max-width: 760px) {
        main {
          display: block;
          width: 100vw;
          max-width: 100vw;
          padding: 16px;
        }
        .panel {
          width: calc(100% - 16px);
          max-width: calc(100% - 16px);
          margin-bottom: 24px;
        }
        .intro { padding: 20px; }
        h1 { font-size: 26px; }
        .chat { min-height: 620px; }
        .msg { max-width: 92%; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel intro">
        <h1>智能客服业务智能体</h1>
        <p>面向真实商家的客服智能体试点方案：接住重复咨询，回答标准问题，收集线索，复杂问题转人工。</p>
        <div class="meta">
          <div>
            <strong>当前版本</strong>
            Dify Cloud 知识库版 MVP，已完成验收。
          </div>
          <div>
            <strong>交付方式</strong>
            首版使用 Dify WebApp / 嵌入入口，API 接入放到二阶段。
          </div>
        </div>
        <h2>可接管的重复工作</h2>
        <ul>
          <li>回答服务、价格、预约、售后等常见问题。</li>
          <li>遇到购买或试点意向时收集线索。</li>
          <li>遇到合同、退款、正式报价等问题转人工。</li>
        </ul>
        <h2>试试这些问题</h2>
        <div class="chips" id="chips"></div>
      </section>

      <section class="panel chat">
        <div class="chat-header">
          <strong>商家智能客服试点顾问</strong>
          <span>离线演示版，不连接真实客户数据和 Dify API Key</span>
        </div>
        <div class="messages" id="messages"></div>
        <form class="composer" id="form">
          <input id="input" placeholder="输入问题，例如：你们这个多少钱？" autocomplete="off" />
          <button type="submit">发送</button>
        </form>
      </section>
    </main>

    <script src="./agent.js"></script>
    <script>
      const messages = document.getElementById("messages");
      const input = document.getElementById("input");
      const form = document.getElementById("form");
      const chips = document.getElementById("chips");

      const examples = [
        "和普通聊天机器人有什么区别？",
        "这个智能客服能做什么功能？",
        "你们这个多少钱？",
        "客户需要准备什么资料？",
        "我想做一个试点演示"
      ];

      function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      examples.forEach((text) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chip";
        button.textContent = text;
        button.addEventListener("click", () => {
          input.value = text;
          form.requestSubmit();
        });
        chips.appendChild(button);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, "user");
        input.value = "";
        window.setTimeout(() => addMessage(window.CustomerServiceAgent.reply(text), "bot"), 250);
      });

      addMessage("你好，我是智能客服业务智能体演示助手。你可以问产品能力、交付范围、价格口径、客户资料准备和 API 接入边界。", "bot");
    </script>
  </body>
</html>
